<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="description" content="Join the Lagos Chamber of Commerce and connect with businesses in Lagos.">
  <meta name="author" content="Micah Maurice Bassey">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lagos Chamber of Commerce | Join</title>

  <link rel="stylesheet" href="styles/small.css">
  <link rel="stylesheet" href="styles/large.css">
  <link rel="stylesheet" href="styles/join.css">

</head>

<body>

<header>
  <nav>
    <a href="index.html">Home</a>
    <a href="directory.html">Directory</a>
    <a href="join.html" class="active">Join</a>
  </nav>
</header>

<main>

  <h1>Join the Chamber</h1>

  <div class="join-layout">

    <!-- FORM -->
    <form method="get" action="thankyou.html">

      <label>
        First Name
        <input type="text" name="firstname" autocomplete="given-name" required>
      </label>

      <label>
        Last Name
        <input type="text" name="lastname" autocomplete="family-name" required>
      </label>

      <label>
        Organization Title
        <input type="text"
               name="orgtitle"
               autocomplete="organization-title"
               pattern="[A-Za-z\s\-]{7,}"
               title="Minimum 7 letters, spaces or hyphens only">
      </label>

      <label>
        Email
        <input type="email"
               name="email"
               placeholder="example@email.com"
               autocomplete="email"
               required>
      </label>

      <label>
        Phone
        <input type="tel" name="phone" autocomplete="tel" required>
      </label>

      <label>
        Business Name
        <input type="text" name="business" autocomplete="organization" required>
      </label>

      <label>
        Membership Level
        <select name="membership" required>
          <option value="">Select Level</option>
          <option value="np">NP Membership</option>
          <option value="bronze">Bronze</option>
          <option value="silver">Silver</option>
          <option value="gold">Gold</option>
        </select>
      </label>

      <label>
        Business Description
        <textarea name="description"></textarea>
      </label>

      <input type="hidden" name="timestamp" id="timestamp">

      <input type="submit" value="Apply Now">

    </form>

    <!-- CARDS -->
    <section class="cards">

      <div class="card">
        <h3>NP Membership</h3>
        <button onclick="document.getElementById('np').showModal()">View Benefits</button>
      </div>

      <div class="card">
        <h3>Bronze</h3>
        <button onclick="document.getElementById('bronze').showModal()">View Benefits</button>
      </div>

      <div class="card">
        <h3>Silver</h3>
        <button onclick="document.getElementById('silver').showModal()">View Benefits</button>
      </div>

      <div class="card">
        <h3>Gold</h3>
        <button onclick="document.getElementById('gold').showModal()">View Benefits</button>
      </div>

    </section>

  </div>

  <!-- MODALS -->

  <dialog id="np">
    <h2>NP Membership</h2>
    <p>No fees for non-profits.</p>
    <button onclick="document.getElementById('np').close()">Close</button>
  </dialog>

  <dialog id="bronze">
    <h2>Bronze Membership</h2>
    <p>Basic listing and networking access.</p>
    <button onclick="document.getElementById('bronze').close()">Close</button>
  </dialog>

  <dialog id="silver">
    <h2>Silver Membership</h2>
    <p>Includes events and promotions.</p>
    <button onclick="document.getElementById('silver').close()">Close</button>
  </dialog>

  <dialog id="gold">
    <h2>Gold Membership</h2>
    <p>Premium spotlight and advertising benefits.</p>
    <button onclick="document.getElementById('gold').close()">Close</button>
  </dialog>

</main>

<script src="scripts/join.js" defer></script>

</body>
</html>
